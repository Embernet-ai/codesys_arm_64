image:
  repository: debian
  pullPolicy: IfNotPresent
  tag: "bullseye"

# The URL for the CODESYS package to download and install
# Provided: ARM 32-bit package (runs on ARM64 with 32-bit libs or ARM32 hardware)
installerUrl: "https://github.com/Embernet-ai/codesys_arm_64/releases/download/v4.18.0.0/CODESYS.Control.for.Linux.ARM.32.bit.SL.4.18.0.0.package"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  privileged: true
  # CODESYS requires privileged access for hardware and networking
  allowPrivilegeEscalation: true

service:
  type: LoadBalancer
  ports:
    gateway: 1217
    opcua: 4840
    webvisu: 8080

ingress:
  enabled: false

  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to default to low limits for PLC runtimes as they are real-time critical
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

persistence:
  enabled: true
  storageClass: "-" # Use default storage class
  accessMode: ReadWriteOnce
  size: 5Gi
  path: /var/opt/codesys

nodeSelector: {}

tolerations: []

affinity: {}
