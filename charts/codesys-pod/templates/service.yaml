apiVersion: v1
kind: Service
metadata:
  # MUST be exactly .Release.Name: the dashboard builds the launch FQDN from the
  # Service object name (services.go:98) while the node-card path builds it from
  # the pod's app.kubernetes.io/instance label (= .Release.Name). If they differ
  # the node card 502s. `fullname` appended "-codesys-pod", so `ut3-codesys`
  # rendered Service `ut3-codesys-codesys-pod` — the break that stopped a second
  # instance from being reachable. See App Store chart spec §4.
  name: {{ .Release.Name }}
  labels:
    {{- include "codesys-pod.labels" . | nindent 4 }}
    {{- include "codesys-pod.storeLabels" . | nindent 4 }}
    # app label must match the registered Flux service name for cross-site launch
    # (client.go:421-425); without it a remote-site pod falls back to a
    # cluster-local FQDN that will not resolve. Spec §7.
    app: {{ .Release.Name | quote }}
    {{- with .Values.tenantLabels }}
    {{- include "codesys-pod.tenantLabels" $ | nindent 4 }}
    {{- end }}
  annotations:
    # Flux/Ziti mesh exposure (WebVisu) so the remote-site dashboard can dial it
    # and derive tenant from the Ziti role attribute. Spec §7 (remote-site path).
    flux.embernet.ai/expose: "true"
    {{- with .Values.embernet }}{{- if .displayName }}
    embernet.ai/display-name: {{ .displayName | quote }}
    {{- end }}{{- end }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.ports.gateway }}
      targetPort: gateway
      protocol: TCP
      name: gateway
    - port: {{ .Values.service.ports.opcua }}
      targetPort: opcua
      protocol: TCP
      name: opcua
    - port: {{ .Values.service.ports.webvisu }}
      targetPort: webvisu
      protocol: TCP
      name: webvisu
    {{- if .Values.sidecarProxy.enabled }}
    - port: {{ .Values.sidecarProxy.listenPort }}
      targetPort: proxy-http
      protocol: TCP
      name: proxy-http
    {{- end }}
  selector:
    {{- include "codesys-pod.selectorLabels" . | nindent 4 }}
