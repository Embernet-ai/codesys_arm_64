apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codesys-arm-app.fullname" . }}
  labels:
    {{- include "codesys-arm-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "codesys-arm-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codesys-arm-app.selectorLabels" . | nindent 8 }}
        {{- include "codesys-arm-app.storeLabels" . | nindent 8 }}
        # app label = registered Flux service name (spec §7 cross-site launch)
        app: {{ .Release.Name | quote }}
        {{- with .Values.tenantLabels }}
        {{- include "codesys-arm-app.tenantLabels" $ | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.sidecarProxy.enabled }}
        checksum/sidecar-proxy: {{ include (print $.Template.BasePath "/configmap-sidecar-proxy.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.embernet }}{{- if .displayName }}
        embernet.ai/display-name: {{ .displayName | quote }}
        {{- end }}{{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.network.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- else }}
      dnsPolicy: ClusterFirst
      {{- end }}

      initContainers:
        - name: download-installer
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Downloading installer from {{ .Values.installerUrl }}..."
              mkdir -p /installer
              curl -L "{{ .Values.installerUrl }}" -o /installer/package.zip
              echo "Unzipping..."
              unzip -o /installer/package.zip -d /installer
              echo "Download and extraction complete."
          volumeMounts:
            - name: installer-volume
              mountPath: /installer

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Checking for CODESYS installation..."

              install_deps() {
                echo "Installing OS dependencies..."
                apt-get update
                apt-get install -y libcap2-bin unzip iptables net-tools equivs
              }

              # Build + install an empty codemeter-lite shim. The
              # codesyscontrol .deb declares `Depends: codemeter |
              # codemeter-lite` which is unsatisfiable on plain Debian.
              # Without this shim, `apt-get install -f -y` resolves the
              # dependency by REMOVING the half-installed codesyscontrol
              # package — silently. Container then comes up "Up" with no
              # codesyscontrol binary present (same 9-day silent outage
              # pattern as cp02/universaltester004). Demo mode runs
              # without the real CodeMeter daemon, so an empty equivs
              # package is fine. Mirrors the AMD chart fix at
              # Embernet-ai/Codesys-AMD-64-x86 PR #1.
              install_codemeter_shim() {
                if dpkg-query -W -f='${Status}' codemeter-lite 2>/dev/null | grep -q "install ok installed"; then
                  echo "codemeter-lite shim already installed."
                  return
                fi
                echo "Building empty codemeter-lite shim with equivs..."
                # Build the equivs control file via printf rather than a
                # heredoc — a heredoc with content at column 0 breaks
                # this YAML's `|` block scalar (helm lint: "unable to
                # parse YAML: ... could not find expected ':'"). printf
                # keeps every line of the YAML block at its proper
                # indent.
                printf '%s\n' \
                  'Package: codemeter-lite' \
                  'Version: 99.0-codesys-pod-shim' \
                  'Section: misc' \
                  'Priority: optional' \
                  'Architecture: all' \
                  'Maintainer: codesys-pod chart <support@embernet.ai>' \
                  'Description: Empty shim that satisfies codesyscontrols codemeter-lite dep.' \
                  ' Demo mode does not require the CodeMeter daemon; this package only' \
                  ' exists so dpkg dependency check passes without apt-get pulling' \
                  ' the half-installed codesyscontrol back out.' \
                  > /tmp/codemeter-lite.ctrl
                cd /tmp && equivs-build codemeter-lite.ctrl
                dpkg -i /tmp/codemeter-lite_99.0-codesys-pod-shim_all.deb
              }

              # Locate the .deb recursively (the CODESYS Linux .package
              # ZIP nests the deb at Delivery/linux-arm64/ — prefer the
              # canonical filename glob, fall back to broader pattern.)
              DEB_FILE=$(find /installer -name 'codesyscontrol_*arm64.deb' -print -quit)
              if [ -z "$DEB_FILE" ]; then
                DEB_FILE=$(find /installer -name '*codesyscontrol*.deb' -o -name '*CODESYS*.deb' | head -n 1)
              fi

              if [ -z "$DEB_FILE" ]; then
                echo "ERROR: No .deb file found anywhere under /installer"
                ls -R /installer
                exit 1
              fi
              echo "Found CODESYS deb: $DEB_FILE"

              if ! dpkg-query -W -f='${Status}' codesyscontrol 2>/dev/null | grep -q "install ok installed"; then
                echo "Installing CODESYS from $DEB_FILE..."
                install_deps
                install_codemeter_shim
                # dpkg -i with the shim in place; NO `apt-get install -f -y`
                # fallback (that's what silently removes the half-installed
                # package when deps fail).
                dpkg -i "$DEB_FILE"
                # Hard assertions: the binary AND the cfgs MUST exist
                # post-install, AND CmpRetain must be registered in the
                # user component list (otherwise CmpApp safe-modes on
                # the RetainUpdate import — exactly the cp02 failure).
                test -x /opt/codesys/bin/codesyscontrol.bin || { echo "ERROR: post-dpkg binary missing" >&2; exit 1; }
                test -f /etc/codesyscontrol/CODESYSControl.cfg || { echo "ERROR: cfg missing" >&2; exit 1; }
                grep -q '^Component\..*=CmpRetain' /etc/codesyscontrol/CODESYSControl_User.cfg || { echo "ERROR: CmpRetain not registered (postinst did not run cleanly)" >&2; exit 1; }
                echo "Installation complete."
              else
                echo "CODESYS already installed."
              fi

              # Ensure persistence directory exists and permissions are correct
              mkdir -p /var/opt/codesys

              echo "Starting CODESYS Control..."
              # Path verbatim from /etc/init.d/codesyscontrol:17,20,65 of
              # the shipped .deb:
              #   EXEC=/opt/codesys/bin/codesyscontrol.bin
              #   WORKDIR=/var/opt/codesys
              #   CONFIGFILE=/etc/codesyscontrol/CODESYSControl.cfg
              # Prior invocation `/etc/CODESYSControl.cfg` (no subdir) +
              # `-d` flag was wrong — runtime falls back to internal
              # defaults, skips loading CmpRetain → CmpApp safe mode.
              if [ -x /opt/codesys/bin/codesyscontrol.bin ]; then
                 cd /var/opt/codesys
                 exec /opt/codesys/bin/codesyscontrol.bin /etc/codesyscontrol/CODESYSControl.cfg
              else
                 echo "Binary not found, searching..." >&2
                 find /opt -name "codesyscontrol.bin"
                 exit 1
              fi
          ports:
            - name: gateway
              containerPort: {{ .Values.service.ports.gateway }}
              protocol: TCP
              {{- if .Values.network.hostNetwork }}
              hostPort: {{ .Values.service.ports.gateway }}
              {{- end }}
            - name: opcua
              containerPort: {{ .Values.service.ports.opcua }}
              protocol: TCP
              {{- if .Values.network.hostNetwork }}
              hostPort: {{ .Values.service.ports.opcua }}
              {{- end }}
            - name: webvisu
              containerPort: {{ .Values.service.ports.webvisu }}
              protocol: TCP
              {{- if .Values.network.hostNetwork }}
              hostPort: {{ .Values.service.ports.webvisu }}
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.path }}
            - name: installer-volume
              mountPath: /installer
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ── Sidecar Reverse Proxy (MUST be last container) ──────────────
        {{- if .Values.sidecarProxy.enabled }}
        - name: sidecar-proxy
          image: "{{ .Values.sidecarProxy.image.repository }}:{{ .Values.sidecarProxy.image.tag }}"
          imagePullPolicy: {{ .Values.sidecarProxy.image.pullPolicy }}
          ports:
            - name: proxy-http
              containerPort: {{ .Values.sidecarProxy.listenPort }}
              protocol: TCP
              {{- if .Values.network.hostNetwork }}
              hostPort: {{ .Values.sidecarProxy.listenPort }}
              {{- end }}
          volumeMounts:
            - name: sidecar-proxy-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: sidecar-proxy-tmp
              mountPath: /tmp
            - name: sidecar-proxy-cache
              mountPath: /var/cache/nginx
            - name: sidecar-proxy-run
              mountPath: /var/run
          resources:
            {{- toYaml .Values.sidecarProxy.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.sidecarProxy.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /sidecar-health
              port: {{ .Values.sidecarProxy.listenPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /sidecar-health
              port: {{ .Values.sidecarProxy.listenPort }}
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /sidecar-health
              port: {{ .Values.sidecarProxy.listenPort }}
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 10
        {{- end }}

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "codesys-arm-app.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: installer-volume
          emptyDir: {}
        {{- if .Values.sidecarProxy.enabled }}
        - name: sidecar-proxy-config
          configMap:
            name: {{ include "codesys-arm-app.fullname" . }}-sidecar-proxy
        - name: sidecar-proxy-tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: sidecar-proxy-cache
          emptyDir:
            sizeLimit: 64Mi
        - name: sidecar-proxy-run
          emptyDir:
            sizeLimit: 1Mi
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
