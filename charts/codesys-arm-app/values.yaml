# =============================================================================
# CODESYS Control ARM32 — Default Configuration
# =============================================================================
# EmberNET Industrial Dashboard — Helm Chart Values
# Fireball Industries — https://embernet.ai
# =============================================================================

# ==================== Dashboard-injected values ====================
# The dashboard's App Store deploy path stamps these in. The chart is
# responsible for rendering them onto BOTH the pod template and the Service.
# tenantLabels carries embernet.ai/tenant — without it on the Service the app
# is invisible to every tenant-scoped view (visible to SuperAdmin only). See
# App Store chart spec §2. Safe to leave empty for a manual local install.
embernet:
  displayName: ""       # -> embernet.ai/display-name annotation
tenantLabels: {}        # -> e.g. { embernet.ai/tenant: acme, embernet.ai/deployed-by: user }

# ==================== Container Image ====================
image:
  repository: debian
  pullPolicy: IfNotPresent
  tag: "bullseye"

# ==================== CODESYS Installer ====================
# The URL for the CODESYS package to download and install.
# Provided: ARM 32-bit package (runs on ARM64 with 32-bit libs or ARM32 hardware)
installerUrl: "https://github.com/Embernet-ai/codesys_arm_64/releases/download/v4.20.0.0/CODESYS.Control.for.Linux.ARM.32.bit.SL.4.20.0.0.package"

# ==================== Image Pull Secrets ====================
imagePullSecrets: []

# ==================== Replica Count ====================
replicaCount: 1

# ==================== Resource Limits ====================
resources:
  # PLC runtimes are real-time critical — do not under-provision
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# ==================== Service ====================
service:
  type: ClusterIP
  port: 8080
  ports:
    gateway: 1217
    opcua: 4840
    webvisu: 8080

# ==================== Node Selector ====================
# Injected by the Industrial Dashboard when deploying to specific nodes
nodeSelector: {}

# ==================== Tolerations ====================
tolerations: []

# ==================== Affinity ====================
affinity: {}

# ==================== GUI (Industrial Dashboard Discovery) ====================
gui:
  enabled: true
  port: 8080
  type: "web"
  displayName: "CODESYS Control ARM32"

# ==================== Persistence ====================
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  path: /var/opt/codesys

# ==================== Network ====================
network:
  # Default OFF so multiple CODESYS instances can run on ONE edge node.
  # hostNetwork+hostPort binds the node's real 4840/8080/1217 — a second
  # instance on the same node then fails to schedule on the port conflict, which
  # is what actually blocked multi-instance (independent of the Service-naming
  # bug). With hostNetwork off each instance gets its own pod IP + ClusterIP,
  # and the reconciler exposes that ClusterIP over the Flux mesh (host config
  # already targets the ClusterIP, not the node IP). Ignition reaches OPC-UA at
  # <release>.<ns>.svc.cluster.local:4840. Set true ONLY for a single-instance
  # node that needs raw host-IP access and accept it cannot be scaled per node.
  hostNetwork: false
  extraPorts: []

# ==================== Security Context ====================
securityContext:
  # CODESYS requires privileged access for hardware and networking
  privileged: true
  allowPrivilegeEscalation: true

# ==================== Sidecar Proxy ====================
# URL-rewriting reverse proxy for Industrial Dashboard SPA integration.
# CODESYS WebVisu is a simple server-rendered HTML5 HMI — sidecar is
# NOT needed by default. Enable only if WebVisu assets break through proxy.
sidecarProxy:
  enabled: false
  image:
    repository: "nginxinc/nginx-unprivileged"
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  listenPort: 8081
  upstream:
    port: 8080
  proxyBasePath: "/"
  nginx:
    workerProcesses: "auto"
    workerConnections: 256
    clientMaxBodySize: "10m"
    logLevel: "warn"
  resources:
    requests:
      cpu: "25m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  securityContext:
    runAsUser: 101
    runAsGroup: 101
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# ==================== Environment Variables ====================
env: []

# ==================== Environment From ====================
envFrom: []

# ==================== App-Specific Config ====================
config: {}
