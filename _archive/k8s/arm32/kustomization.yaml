# CODESYS Kustomization for ARM32
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: codesys

resources:
- pvc.yaml
- deployment.yaml
- service.yaml

commonLabels:
  app: codesys
  arch: arm32
  managed-by: kustomize

# ConfigMap generator for custom configurations
configMapGenerator:
- name: codesys-arm32-config
  files:
  - CODESYSControl.cfg
  behavior: create
  options:
    disableNameSuffixHash: true

# Variables for environment-specific overrides
vars:
- name: REPLICA_COUNT
  objref:
    kind: Deployment
    name: codesys-arm32
    apiVersion: apps/v1
  fieldref:
    fieldpath: spec.replicas
