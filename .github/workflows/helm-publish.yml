name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint charts/codesys-arm-app

  publish:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p .deploy
          helm package charts/codesys-arm-app -d .deploy
          # Fetch existing index from gh-pages and merge (preserves old versions)
          curl -sSL https://embernet-ai.github.io/codesys_arm_64/index.yaml -o .deploy/existing-index.yaml || true
          # Validate the downloaded file is actual YAML (not a 404 HTML page)
          if [ -f .deploy/existing-index.yaml ] && head -1 .deploy/existing-index.yaml | grep -q "^apiVersion:"; then
            echo "Valid existing index found — merging"
            helm repo index .deploy --url https://embernet-ai.github.io/codesys_arm_64/ --merge .deploy/existing-index.yaml
          else
            echo "No valid existing index — generating fresh"
            rm -f .deploy/existing-index.yaml
            helm repo index .deploy --url https://embernet-ai.github.io/codesys_arm_64/
          fi
          rm -f .deploy/existing-index.yaml
          # DEPRECATION: the chart was renamed codesys-pod -> codesys-arm-app.
          # The --merge above pulls the live index which still carries the old
          # codesys-pod entries; strip them so the rename is not re-resurrected.
          # yq is preinstalled on ubuntu-latest GitHub runners.
          if grep -q '^  codesys-pod:' .deploy/index.yaml; then
            echo "Stripping deprecated codesys-pod entries from index"
            yq -i 'del(.entries["codesys-pod"])' .deploy/index.yaml
          fi
          # Fail the publish if codesys-pod somehow survives the strip.
          if grep -q 'codesys-pod' .deploy/index.yaml; then
            echo "ERROR: codesys-pod still present in index after strip" >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .deploy
          keep_files: true
